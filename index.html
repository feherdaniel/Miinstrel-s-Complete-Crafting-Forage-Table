<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foraging Results</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row label {
      min-width: 80px;
    }

    .row input,
    .row select,
    textarea {
      flex: 1;
      padding: 6px;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 300px;
      margin-top: 15px;
      padding: 10px;
      box-sizing: border-box;
      resize: both;
    }
  </style>
</head>
<body>
  <h2>Foraging Results</h2>

  <form id="forageForm">
    <div class="row">
      <label for="rarity">Rarity</label>
      <select id="rarity" name="rarity"></select>
    </div>

    <div class="row">
      <label for="nature">Identify (Intelligence or Wisdom + Nature)</label>
      <input type="number" id="nature" name="nature" value="0" />
    </div>

    <div class="row">
      <label for="survival">Forage (Strength or Dexterity + Survival)</label>
      <input type="number" id="survival" name="survival" value="0" />
    </div>

    <div class="row">
      <label for="badWeather">Bad Weather (increases DC by 2)</label>
      <input type="checkbox" id="badWeather" name="badWeather" style="flex: 0;" />
    </div>

    <div class="row">
      <label for="hostileArea">Hostile Area (increases DC by 2)</label>
      <input type="checkbox" id="hostileArea" name="hostileArea" style="flex: 0;" />
    </div>

    <div class="row">
      <label for="nat20">Type-based random no-roll</label>
      <input type="checkbox" id="nat20" name="nat20" style="flex: 0;" />
    </div>

    <div class="row" id="rollWrap">
      <label for="roll">D100 Roll</label>
      <input type="number" id="roll" name="roll" value="0" />
    </div>

    <div class="row" id="nat20TypeWrap" style="display: none;">
      <label for="nat20Type">Type</label>
      <select id="nat20Type" name="nat20Type"></select>
    </div>

    <div class="row">
      <button type="submit">Confirm</button>
    </div>
  </form>

  <textarea id="output" readonly placeholder="Results will appear here..."></textarea>

  <script src="forage-tool.js"></script>
</body>
</html>
